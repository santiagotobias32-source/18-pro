<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis 18 Años</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #0b0b0f;
      color: white;
      overflow-x: hidden;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle at top, #1a1a2e, #0b0b0f);
      position: relative;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin-bottom: 10px;
      animation: fadeIn 2s ease;
    }

    .hero p {
      font-size: 1rem;
      opacity: 0.8;
      margin-bottom: 25px;
      animation: fadeIn 3s ease;
    }

    .btn {
      padding: 12px 25px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      border-radius: 30px;
      transition: 0.3s;
      text-decoration: none;
    }

    .btn:hover {
      background: white;
      color: black;
      transform: scale(1.05);
    }

    /* CONTADOR */
    .contador {
      margin-top: 30px;
      font-size: 1.2rem;
      letter-spacing: 2px;
    }

    /* SECCION */
    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 20px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <h1>Mis 18 Años</h1>
    <p>Estás invitado a una noche inolvidable</p>

    <a class="btn" href="#contador">Ver invitación</a>

    <div class="contador" id="contador">
      Cargando contador...
    </div>
  </section>

  <!-- INFO -->
  <section class="section">
    <h2>Celebración</h2>
    <p>Una noche especial para compartir con personas importantes.</p>
  </section>

  <script>
    // 🎯 CONTADOR SIMPLE
    const targetDate = new Date("2026-09-01T21:00:00").getTime();

    const countdown = setInterval(() => {
      const now = new Date().getTime();
      const distance = targetDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("contador").innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;

      if (distance < 0) {
        clearInterval(countdown);
        document.getElementById("contador").innerHTML = "¡Hoy es el gran día!";
      }
    }, 1000);
  </script>

</body>
</html>
